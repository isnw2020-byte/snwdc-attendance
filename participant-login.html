<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>QR 출결 로그인 - 성남여성인력개발센터</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#1e3a8a"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100dvh;
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 55%, #2563eb 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .logo-wrap { text-align: center; margin-bottom: 24px; }
    .logo-icon {
      width: 76px; height: 76px;
      background: rgba(255,255,255,.15);
      border: 2px solid rgba(255,255,255,.25);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px; font-size: 36px;
    }
    .logo-wrap h1 { font-size: 18px; font-weight: 900; color: white; line-height: 1.4; }
    .logo-wrap p  { font-size: 13px; color: rgba(255,255,255,.55); margin-top: 4px; }

    .login-card {
      width: 100%; max-width: 400px;
      background: white; border-radius: 22px;
      padding: 30px 26px;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
    }
    .card-top { text-align: center; margin-bottom: 22px; }
    .card-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }
    .card-icon i { font-size: 28px; color: #7c3aed; }
    .card-top h2 { font-size: 18px; font-weight: 800; color: #1e293b; }
    .card-top p  { font-size: 13px; color: #64748b; margin-top: 4px; line-height: 1.6; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 6px; }
    .field label .req { color: #ef4444; margin-left: 2px; }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: #94a3b8; font-size: 14px; pointer-events: none;
    }
    .field input {
      width: 100%; padding: 13px 14px 13px 40px;
      border: 1.5px solid #e2e8f0; border-radius: 11px;
      font-size: 16px; font-family: 'Noto Sans KR', sans-serif;
      color: #1e293b; outline: none; transition: border-color .2s;
      -webkit-appearance: none;
    }
    .field input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.1); }
    .birth-hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }

    .error-box {
      display: none; align-items: flex-start; gap: 8px;
      background: #fff1f2; border: 1px solid #fca5a5;
      border-radius: 10px; padding: 11px 13px;
      font-size: 12px; color: #dc2626;
      margin-bottom: 14px; line-height: 1.6;
    }
    .error-box.show { display: flex; }
    .error-box i { margin-top: 1px; flex-shrink: 0; }

    /* 성공 박스 */
    .success-box {
      display: none; align-items: flex-start; gap: 8px;
      background: #f0fdf4; border: 1px solid #86efac;
      border-radius: 10px; padding: 11px 13px;
      font-size: 12px; color: #16a34a;
      margin-bottom: 14px; line-height: 1.6;
    }
    .success-box.show { display: flex; }

    .btn-start {
      width: 100%; padding: 15px; border: none; border-radius: 13px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white; font-size: 16px; font-weight: 800;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      font-family: 'Noto Sans KR', sans-serif;
      box-shadow: 0 4px 18px rgba(124,58,237,.4);
    }
    .btn-start:active { transform: scale(.98); }
    .btn-start:disabled { opacity: .65; cursor: not-allowed; }

    .guide-box {
      margin-top: 16px; padding: 12px 14px;
      background: #f5f3ff; border: 1px solid #ddd6fe;
      border-radius: 11px; font-size: 12px; color: #5b21b6; line-height: 1.8;
    }
    .guide-box strong { color: #4c1d95; }

    .spinner-sm {
      display: inline-block; width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: white; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .version { margin-top: 18px; font-size: 10px; color: rgba(255,255,255,.28); text-align: center; }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <div class="logo-icon">🏫</div>
    <h1>성남여성인력개발센터</h1>
    <p>직업교육훈련 출결 관리</p>
  </div>

  <div class="login-card">
    <div class="card-top">
      <div class="card-icon"><i class="fa fa-camera"></i></div>
      <h2>참여자 QR 출결</h2>
      <p>이름과 생년월일을 입력하면<br/>QR 카메라 출결 화면으로 이동합니다.</p>
    </div>

    <form id="loginForm" onsubmit="doLogin(event)" autocomplete="on">

      <div class="field">
        <label for="pName">성명 <span class="req">*</span></label>
        <div class="input-wrap">
          <i class="fa fa-user input-icon"></i>
          <input type="text" id="pName" placeholder="이름을 입력하세요"
            required autocomplete="name" inputmode="text"/>
        </div>
      </div>

      <div class="field">
        <label for="pBirth">생년월일 <span class="req">*</span></label>
        <div class="input-wrap">
          <i class="fa fa-calendar input-icon"></i>
          <input type="text" id="pBirth"
            placeholder="예: 19900115 또는 1990-01-15"
            required inputmode="numeric" autocomplete="bday" maxlength="10"/>
        </div>
        <div class="birth-hint">숫자 8자리 입력 시 자동 변환 (YYYY-MM-DD)</div>
      </div>

      <div class="error-box" id="errBox">
        <i class="fa fa-circle-exclamation"></i>
        <span id="errMsg">정보를 확인할 수 없습니다.</span>
      </div>

      <div class="success-box" id="successBox">
        <i class="fa fa-circle-check"></i>
        <span id="successMsg">로그인 성공! 잠시 후 이동합니다...</span>
      </div>

      <button type="submit" class="btn-start" id="loginBtn">
        <i class="fa fa-camera"></i> QR 출결 시작
      </button>
    </form>

    <div class="guide-box">
      <strong>📌 이용 방법</strong><br/>
      ① 이름과 생년월일을 입력하세요<br/>
      ② 카메라 시작 후 <strong>QR 코드를 스캔</strong>하세요<br/>
      ③ 입실 · 퇴실 각 1회씩 스캔하면 출결 완료!<br/>
      <br/>
      <strong>❓ 로그인이 안 된다면?</strong><br/>
      담당자(관리자)에게 이름·생년월일 등록을 요청하세요.
    </div>
  </div>

  <p class="version">v1.2.0 · 성남여성인력개발센터</p>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script>
// ── 이미 로그인된 참여자 → qr-check로 바로 이동 ──────────────
(function() {
  const s = getAuthSession();
  if (s && s.role === 'participant') {
    const p = new URLSearchParams(window.location.search);
    if (p.get('token') && p.get('courseId')) {
      window.location.href = 'qr-check.html?' + p.toString();
    } else {
      window.location.href = 'qr-check.html';
    }
  }
})();

// ── 생년월일 자동 하이픈 삽입 ────────────────────────────────
document.getElementById('pBirth').addEventListener('input', function() {
  let v = this.value.replace(/\D/g, '');
  if (v.length > 8) v = v.substring(0, 8);
  if (v.length >= 5) v = v.substring(0,4) + '-' + v.substring(4);
  if (v.length >= 8) v = v.substring(0,7) + '-' + v.substring(7);
  this.value = v;
});

// ── 로그인 ────────────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  const errBox     = document.getElementById('errBox');
  const errMsg     = document.getElementById('errMsg');
  const successBox = document.getElementById('successBox');
  const btn        = document.getElementById('loginBtn');

  errBox.classList.remove('show');
  successBox.classList.remove('show');

  // 이름 정규화
  const rawName  = document.getElementById('pName').value;
  const rawBirth = document.getElementById('pBirth').value;

  const name  = rawName.replace(/[\s\u3000\u00A0\u200b]+/g, ' ').trim();
  const birth = rawBirth.replace(/[^\d]/g, ''); // 숫자만

  if (!name) {
    showErr('이름을 입력하세요.');
    return;
  }
  if (birth.length < 8) {
    showErr('생년월일을 올바르게 입력하세요. (예: 19900115)');
    return;
  }

  // YYYY-MM-DD 포맷
  const birthFormatted = `${birth.substring(0,4)}-${birth.substring(4,6)}-${birth.substring(6,8)}`;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span> 확인 중...';

  try {
    // ── 참여자 전체 조회 ──────────────────────────────────
    let participants = [];
    try {
      participants = await apiGetAll('participants');
    } catch(fetchErr) {
      console.error('participants 조회 오류:', fetchErr);
      showErr('서버 연결에 실패했습니다. 잠시 후 다시 시도하세요.');
      resetBtn();
      return;
    }

    // 삭제되지 않은 참여자만
    const active = participants.filter(pt => !pt.deleted);

    console.log(`[로그인] 전체 참여자: ${participants.length}명, 활성: ${active.length}명`);
    console.log(`[로그인] 입력값 - 이름: "${name}", 생년월일: "${birthFormatted}"`);

    // ── 1차: 정확 일치 ───────────────────────────────────
    let found = active.find(pt =>
      pt.name === name && pt.birthDate === birthFormatted
    );

    // ── 2차: 이름 공백 무시 ──────────────────────────────
    if (!found) {
      const cleanName = name.replace(/\s+/g, '');
      found = active.find(pt =>
        (pt.name || '').replace(/\s+/g, '') === cleanName &&
        pt.birthDate === birthFormatted
      );
    }

    // ── 3차: 생년월일 숫자만 비교 ───────────────────────
    if (!found) {
      const cleanName = name.replace(/\s+/g, '');
      found = active.find(pt =>
        (pt.name || '').replace(/\s+/g, '') === cleanName &&
        (pt.birthDate || '').replace(/[^\d]/g, '') === birth
      );
    }

    // ── 4차: 이름 소문자·전각→반각 변환 후 비교 ─────────
    if (!found) {
      const normName = normStr(name);
      found = active.find(pt =>
        normStr(pt.name || '') === normName &&
        (pt.birthDate || '').replace(/[^\d]/g, '') === birth
      );
    }

    if (!found) {
      // 이름만 일치하는 경우 확인 (디버깅 힌트)
      const nameOnly = active.filter(pt =>
        (pt.name || '').replace(/\s+/g, '') === name.replace(/\s+/g, '')
      );
      console.log(`[로그인 실패] 이름만 일치: ${nameOnly.length}명`);
      if (nameOnly.length > 0) {
        console.log('[로그인 실패] DB 생년월일:', nameOnly.map(p => p.birthDate));
        showErr('이름은 확인되었으나 생년월일이 일치하지 않습니다.\n담당자에게 등록 정보를 확인해 주세요.');
      } else {
        showErr('등록된 참여자 정보를 찾을 수 없습니다.\n담당자에게 이름·생년월일 등록을 요청하세요.');
      }
      resetBtn();
      return;
    }

    // ── 로그인 성공 ──────────────────────────────────────
    console.log('[로그인 성공]', found.name, found.birthDate);
    setAuthSession({
      id:        found.id,
      name:      found.name,
      birthDate: found.birthDate,
      role:      'participant'
    });

    document.getElementById('successBox').querySelector('#successMsg').textContent =
      `${found.name}님 확인! 출결 화면으로 이동합니다...`;
    successBox.classList.add('show');

    // QR 파라미터가 URL에 있으면 함께 전달
    const qrParams = new URLSearchParams(window.location.search);
    setTimeout(() => {
      if (qrParams.get('token') && qrParams.get('courseId')) {
        window.location.href = 'qr-check.html?' + qrParams.toString();
      } else {
        window.location.href = 'qr-check.html';
      }
    }, 800);

  } catch (err) {
    console.error('로그인 처리 중 오류:', err);
    showErr('오류가 발생했습니다: ' + (err.message || '알 수 없는 오류'));
    resetBtn();
  }
}

// 문자열 정규화 (전각→반각, 소문자, 공백제거)
function normStr(s) {
  return s
    .replace(/[\s\u3000\u00A0\u200b]+/g, '')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .toLowerCase();
}

function showErr(msg) {
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errBox').classList.add('show');
}

function resetBtn() {
  const btn = document.getElementById('loginBtn');
  btn.disabled = false;
  btn.innerHTML = '<i class="fa fa-camera"></i> QR 출결 시작';
}
</script>
</body>
</html>
