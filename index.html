<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>대시보드 - 성남여성인력개발센터 출결시스템</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .course-card {
      background:white; border:1px solid #e2e8f0; border-radius:12px;
      padding:20px; transition:all .2s; cursor:pointer; display:flex; flex-direction:column; gap:12px;
    }
    .course-card:hover { border-color:#3b82f6; box-shadow:0 4px 20px rgba(59,130,246,.1); transform:translateY(-2px); }
    .course-card .course-name { font-size:15px; font-weight:700; color:#0f172a; line-height:1.4; }
    .course-card .course-meta { font-size:12px; color:#64748b; display:flex; gap:12px; flex-wrap:wrap; }
    .course-card .course-meta span { display:flex; align-items:center; gap:4px; }
    .course-card .course-progress { }
    .course-card .progress-label { display:flex; justify-content:space-between; font-size:11px; color:#64748b; margin-bottom:4px; }
    .courses-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
    .attendance-summary-table { font-size:12px; }
    .attendance-summary-table td { padding:6px 8px; }
  </style>
</head>
<body>

  <!-- Sidebar -->

    <div class="sidebar-logo">
      <div class="logo-icon"><span>🏫</span></div>
      <div>
        <div class="logo-text">성남여성인력개발센터</div>
        <div class="logo-sub">출결관리시스템</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">메인</div>
      <a href="index.html" class="nav-item active"><i class="fa fa-home"></i> 대시보드</a>
      <a href="courses.html" class="nav-item"><i class="fa fa-book"></i> 과정 관리</a>
      <a href="participants.html" class="nav-item"><i class="fa fa-users"></i> 참여자 관리</a>
      <div class="nav-section">출결</div>
      <a href="qr-admin.html" class="nav-item"><i class="fa fa-qrcode"></i> QR 코드 발급</a>
      <a href="attendance.html" class="nav-item"><i class="fa fa-calendar-check"></i> 출결 현황</a>
      <div class="nav-section">보고서</div>
      <a href="report.html" class="nav-item"><i class="fa fa-chart-bar"></i> 리포트/다운로드</a>
      <a href="audit-log.html" class="nav-item"><i class="fa fa-history"></i> 감사 로그</a>
      <div class="nav-section">시스템</div>
      <a href="settings.html" class="nav-item"><i class="fa fa-cog"></i> 시스템 설정</a>
      <a href="holidays.html" class="nav-item"><i class="fa fa-calendar-xmark"></i> 공휴일 관리</a>
    </nav>
    <div class="sidebar-footer">
      <div id="sidebarUser" style="margin-bottom:8px;font-weight:600;"></div>
      <a href="#" onclick="doLogout()" style="color:rgba(255,255,255,.6);font-size:11px;">
        <i class="fa fa-sign-out-alt"></i> 로그아웃
      </a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <header class="top-header">
      <button onclick="toggleSidebar()" style="background:none;border:none;font-size:18px;color:#64748b;display:none;" id="mobileMenuBtn">
        <i class="fa fa-bars"></i>
      </button>
      <span class="page-title"><i class="fa fa-home" style="color:#1e3a8a;"></i> 대시보드</span>
      <div class="header-actions">
        <span id="todayLabel" style="font-size:12px;color:#64748b;"></span>
        <a href="qr-admin.html" class="btn btn-primary btn-sm">
          <i class="fa fa-qrcode"></i> QR 발급
        </a>
      </div>
    </header>

    <main class="page-body fade-in">
      <!-- Stats Row -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-icon" style="background:#eff6ff;"><i class="fa fa-book" style="color:#1e3a8a;"></i></div>
          <div class="stat-label">운영중 과정</div>
          <div class="stat-value" id="statCourses">-</div>
          <div class="stat-sub">전체 <span id="statCoursesAll">-</span>개 과정</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#dcfce7;"><i class="fa fa-users" style="color:#16a34a;"></i></div>
          <div class="stat-label">총 참여자</div>
          <div class="stat-value" id="statParticipants">-</div>
          <div class="stat-sub">활성 수강생</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#fef3c7;"><i class="fa fa-calendar-check" style="color:#d97706;"></i></div>
          <div class="stat-label">오늘 출석</div>
          <div class="stat-value" id="statTodayPresent">-</div>
          <div class="stat-sub">오늘 결석 <span id="statTodayAbsent">-</span>명</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#fee2e2;"><i class="fa fa-triangle-exclamation" style="color:#dc2626;"></i></div>
          <div class="stat-label">미완료(?) 건수</div>
          <div class="stat-value" id="statIncomplete">-</div>
          <div class="stat-sub">확정 필요</div>
        </div>
      </div>

      <!-- Main Content Grid -->
      <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;margin-bottom:20px;" class="main-grid">
        <!-- Course List Card -->
        <div class="card">
          <div class="card-header">
            <i class="fa fa-book" style="color:#1e3a8a;"></i>
            <h3>과정 현황</h3>
            <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
              <select id="courseFilter" class="form-control" style="width:120px;" onchange="loadCourses()">
                <option value="all">전체</option>
                <option value="운영중" selected>운영중</option>
                <option value="예정">예정</option>
                <option value="종료">종료</option>
              </select>
              <a href="courses.html" class="btn btn-primary btn-sm"><i class="fa fa-plus"></i> 과정 추가</a>
            </div>
          </div>
          <div class="card-body" style="padding:16px;">
            <div id="coursesContainer">
              <div class="flex-center" style="padding:40px;"><div class="spinner"></div></div>
            </div>
          </div>
        </div>

        <!-- Right Panel -->
        <div style="display:flex;flex-direction:column;gap:16px;">
          <!-- Quick Actions -->
          <div class="card">
            <div class="card-header">
              <i class="fa fa-bolt" style="color:#d97706;"></i>
              <h3>빠른 실행</h3>
            </div>
            <div class="card-body" style="padding:12px;display:flex;flex-direction:column;gap:8px;">
              <a href="qr-admin.html" class="btn btn-primary btn-block"><i class="fa fa-qrcode"></i> QR 코드 발급/관리</a>
              <a href="report.html" class="btn btn-secondary btn-block"><i class="fa fa-file-excel"></i> 출석부 다운로드</a>
              <a href="attendance.html" class="btn btn-secondary btn-block"><i class="fa fa-calendar-check"></i> 출결 현황 조회</a>
              <a href="courses.html#new" class="btn btn-secondary btn-block"><i class="fa fa-plus"></i> 새 과정 등록</a>
            </div>
          </div>

          <!-- Incomplete Alert -->
          <div class="card" id="incompleteCard" style="display:none;">
            <div class="card-header" style="background:#fff5f5;border-bottom-color:#fecaca;">
              <i class="fa fa-triangle-exclamation" style="color:#dc2626;"></i>
              <h3 style="color:#dc2626;">미완료 출결 확인 필요</h3>
            </div>
            <div class="card-body" style="padding:12px;">
              <div id="incompleteList" style="font-size:12px;display:flex;flex-direction:column;gap:6px;"></div>
              <a href="attendance.html?filter=incomplete" class="btn btn-danger btn-sm btn-block mt-2">
                <i class="fa fa-arrow-right"></i> 전체 확인
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Today's Attendance Overview -->
      <div class="card">
        <div class="card-header">
          <i class="fa fa-calendar-day" style="color:#1e3a8a;"></i>
          <h3 id="todayAttTitle">오늘 출결 현황</h3>
          <div style="margin-left:auto;">
            <button class="btn btn-secondary btn-sm" onclick="refreshTodayAtt()">
              <i class="fa fa-refresh"></i> 새로고침
            </button>
          </div>
        </div>
        <div class="card-body" style="padding:0;">
          <div id="todayAttTable">
            <div class="flex-center" style="padding:40px;color:#94a3b8;">
              <i class="fa fa-spinner fa-spin" style="margin-right:8px;"></i> 로딩 중...
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script>
const session = requireAuth();
if (!session) throw new Error('Not authenticated');

// Sidebar user info
document.getElementById('sidebarUser').textContent = `${session.name} (${session.role === 'admin' ? '관리자' : '담당자'})`;
document.getElementById('todayLabel').textContent = formatDateKR(getTodaySeoul());
document.getElementById('todayAttTitle').textContent = `${formatDateKR(getTodaySeoul())} 출결 현황`;

// Mobile menu
if (window.innerWidth <= 768) {
  document.getElementById('mobileMenuBtn').style.display = 'block';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function doLogout() {
  if (confirm('로그아웃 하시겠습니까?')) {
    clearAuthSession();
    window.location.href = 'login.html';
  }
}

let holidaySet = new Set();

// ===== Load Dashboard Data =====
async function loadDashboard() {
  try {
    // Load holidays
    const hList = await apiGetAll('holidays');
    holidaySet = new Set(hList.map(h => h.date));

    // Load courses
    const allCourses = (await apiGetAll('courses')).filter(c => !c.deleted);

    // Load participants (enrollments)
    const enrollments = await apiGetAll('enrollments');

    // Load sessions
    const sessions = await apiGetAll('sessions');

    // Stats
    const running = allCourses.filter(c => c.status === '운영중');
    document.getElementById('statCourses').textContent = running.length;
    document.getElementById('statCoursesAll').textContent = allCourses.length;

    const activeEnroll = enrollments.filter(e => !e.deleted && e.status === '수강중');
    document.getElementById('statParticipants').textContent = activeEnroll.length;

    // Today attendance
    const today = getTodaySeoul();
    const todaySessions = sessions.filter(s => s.date === today && !s.isCancelled && !s.isInactive);
    const records = await apiGetAll('attendance_records');
    const todayRecords = records.filter(r => todaySessions.some(s => s.id === r.sessionId));

    const presentToday = todayRecords.filter(r => ['○','◎','▲','◎▲'].includes(r.statusCode)).length;
    const absentToday = todayRecords.filter(r => r.statusCode === 'X').length;
    const incompleteCnt = records.filter(r => r.statusCode === '?').length;

    document.getElementById('statTodayPresent').textContent = presentToday;
    document.getElementById('statTodayAbsent').textContent = absentToday;
    document.getElementById('statIncomplete').textContent = incompleteCnt;

    // Incomplete alert
    if (incompleteCnt > 0) {
      document.getElementById('incompleteCard').style.display = 'block';
      const incompleteRecs = records.filter(r => r.statusCode === '?').slice(0, 5);
      const listEl = document.getElementById('incompleteList');
      listEl.innerHTML = incompleteRecs.map(r => {
        const s = sessions.find(s => s.id === r.sessionId);
        return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #fee2e2;">
          <span>${s ? s.date : '-'}</span>
          <span style="color:#ef4444;font-weight:700;">미완료 (?)</span>
        </div>`;
      }).join('');
    }

    loadCourses(allCourses, enrollments, sessions);
    loadTodayAttendance(allCourses, todaySessions, records, enrollments);
  } catch (err) {
    console.error(err);
    showToast('데이터 로드 실패: ' + err.message, 'error');
  }
}

// ===== Course List =====
async function loadCourses(allCourses, enrollments, sessions) {
  if (!allCourses) {
    allCourses = (await apiGetAll('courses')).filter(c => !c.deleted);
    enrollments = await apiGetAll('enrollments');
    sessions = await apiGetAll('sessions');
  }

  const filterVal = document.getElementById('courseFilter').value;
  let courses = filterVal === 'all' ? allCourses : allCourses.filter(c => c.status === filterVal);
  courses = courses.slice(0, 12); // Show max 12

  const container = document.getElementById('coursesContainer');
  if (courses.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <i class="fa fa-book-open"></i>
      <p>등록된 과정이 없습니다.</p>
      <a href="courses.html#new" class="btn btn-primary"><i class="fa fa-plus"></i> 과정 추가</a>
    </div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'courses-grid';

  courses.forEach(c => {
    const cEnrolls = enrollments.filter(e => e.courseId === c.id && !e.deleted && e.status === '수강중');
    const cSessions = sessions.filter(s => s.courseId === c.id && !s.isCancelled && !s.isInactive);
    const today = getTodaySeoul();
    const passedSessions = cSessions.filter(s => s.date <= today);

    const statusColors = { '운영중': '#22c55e', '종료': '#64748b', '예정': '#3b82f6' };
    const statusBg = { '운영중': '#dcfce7', '종료': '#f1f5f9', '예정': '#dbeafe' };

    const card = document.createElement('div');
    card.className = 'course-card';
    card.onclick = () => window.location.href = `attendance.html?courseId=${c.id}`;
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div class="course-name">${escapeHtml(c.name)}</div>
        <span class="badge" style="background:${statusBg[c.status]};color:${statusColors[c.status]};white-space:nowrap;">
          ${c.status || '미설정'}
        </span>
      </div>
      <div class="course-meta">
        <span><i class="fa fa-calendar"></i> ${c.startDate} ~ ${c.endDate}</span>
        <span><i class="fa fa-users"></i> ${cEnrolls.length}명</span>
        <span><i class="fa fa-clock"></i> ${c.startTime || '09:00'} 시작</span>
      </div>
      <div class="course-progress">
        <div class="progress-label">
          <span>진행 ${passedSessions.length}/${cSessions.length}회차</span>
          <span style="font-weight:700;">${cSessions.length > 0 ? Math.round(passedSessions.length/cSessions.length*100) : 0}%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill ${getProgressClass(passedSessions.length, cSessions.length)}"
            style="width:${cSessions.length > 0 ? passedSessions.length/cSessions.length*100 : 0}%">
          </div>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:4px;">
        <a href="attendance.html?courseId=${c.id}" class="btn btn-primary btn-sm" onclick="event.stopPropagation()">
          <i class="fa fa-table"></i> 출석부
        </a>
        <a href="courses.html?edit=${c.id}" class="btn btn-secondary btn-sm" onclick="event.stopPropagation()">
          <i class="fa fa-edit"></i> 수정
        </a>
        <a href="report.html?courseId=${c.id}" class="btn btn-secondary btn-sm" onclick="event.stopPropagation()">
          <i class="fa fa-download"></i> 다운
        </a>
      </div>
    `;
    grid.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(grid);

  if (allCourses.length > 12) {
    const more = document.createElement('div');
    more.style.cssText = 'text-align:center;margin-top:12px;';
    more.innerHTML = `<a href="courses.html" class="btn btn-secondary"><i class="fa fa-list"></i> 전체 과정 보기 (${allCourses.length}개)</a>`;
    container.appendChild(more);
  }
}

function getProgressClass(passed, total) {
  if (!total) return 'fail';
  const pct = passed / total;
  if (pct >= 0.8) return 'pass';
  if (pct >= 0.5) return 'warn';
  return 'fail';
}

// ===== Today Attendance =====
async function loadTodayAttendance(allCourses, todaySessions, records, enrollments) {
  if (!allCourses) {
    const [allCData, allSData, allAData, allEData] = await Promise.all([
      apiGetAll('courses'),
      apiGetAll('sessions'),
      apiGetAll('attendance_records'),
      apiGetAll('enrollments')
    ]);
    allCourses = allCData.filter(c => !c.deleted);
    const today = getTodaySeoul();
    todaySessions = allSData.filter(s => s.date === today && !s.isCancelled && !s.isInactive);
    records = allAData;
    enrollments = allEData;
  }

  const container = document.getElementById('todayAttTable');
  if (todaySessions.length === 0) {
    container.innerHTML = `<div class="empty-state" style="padding:40px;">
      <i class="fa fa-calendar-xmark"></i>
      <p>오늘(${getTodaySeoul()})은 교육 세션이 없습니다.</p>
    </div>`;
    return;
  }

  let html = `<div class="table-wrapper" style="border-radius:0 0 12px 12px;border:none;">
  <table class="data-table attendance-summary-table">
    <thead>
      <tr>
        <th>과정명</th>
        <th class="text-center">수강인원</th>
        <th class="text-center">출석(○)</th>
        <th class="text-center">지각(◎)</th>
        <th class="text-center">조퇴(▲)</th>
        <th class="text-center">결석(X)</th>
        <th class="text-center">미완료(?)</th>
        <th class="text-center">미체크</th>
        <th class="text-right">출석률</th>
        <th></th>
      </tr>
    </thead>
    <tbody>`;

  todaySessions.forEach(s => {
    const course = allCourses.find(c => c.id === s.courseId);
    if (!course) return;
    const enrolled = enrollments.filter(e => e.courseId === course.id && !e.deleted && e.status === '수강중');
    const sessionRecords = records.filter(r => r.sessionId === s.id);

    const counts = { '○': 0, '◎': 0, '▲': 0, '◎▲': 0, 'X': 0, '?': 0 };
    sessionRecords.forEach(r => { if (counts[r.statusCode] !== undefined) counts[r.statusCode]++; });
    const unchecked = enrolled.length - sessionRecords.length;
    const presentTotal = counts['○'] + counts['◎'] + counts['▲'] + counts['◎▲'];
    const rate = enrolled.length > 0 ? (presentTotal / enrolled.length * 100).toFixed(1) : 0;

    html += `<tr>
      <td><strong>${escapeHtml(course.name)}</strong></td>
      <td class="text-center">${enrolled.length}</td>
      <td class="text-center"><span style="color:#22c55e;font-weight:700;">${counts['○']}</span></td>
      <td class="text-center"><span style="color:#f59e0b;font-weight:700;">${counts['◎'] + counts['◎▲']}</span></td>
      <td class="text-center"><span style="color:#f97316;font-weight:700;">${counts['▲'] + counts['◎▲']}</span></td>
      <td class="text-center"><span style="color:#dc2626;font-weight:700;">${counts['X']}</span></td>
      <td class="text-center"><span style="color:#94a3b8;font-weight:700;">${counts['?']}</span></td>
      <td class="text-center"><span style="color:#64748b;">${Math.max(0, unchecked)}</span></td>
      <td class="text-right">
        <span style="font-weight:700;color:${parseFloat(rate) >= 80 ? '#22c55e' : '#ef4444'}">${rate}%</span>
      </td>
      <td><a href="attendance.html?courseId=${course.id}" class="btn btn-secondary btn-sm"><i class="fa fa-arrow-right"></i></a></td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  container.innerHTML = html;
}

async function refreshTodayAtt() {
  document.getElementById('todayAttTable').innerHTML = '<div class="flex-center" style="padding:40px;"><div class="spinner"></div></div>';
  await loadTodayAttendance();
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Init
loadDashboard();
</script>
</body>
</html>
